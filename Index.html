<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Variant Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      background-color: #f0f0f0;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 30px;
    }
    button {
      font-size: 18px;
      margin: 5px;
      padding: 10px 20px;
      cursor: pointer;
    }
    #timer {
      font-size: 72px;
      margin-top: 50px;
      color: black;
    }
  </style>
</head>
<body>
  <h1>Timer</h1>
  
  <!-- Buttons for different timers -->
  <button onclick="startTimer(60)">60 Seconds</button>
  <button onclick="startTimer(20)">20 Seconds</button>
  <button onclick="startTimer(10)">10 Seconds</button>
  
  <!-- Timer display -->
  <div id="timer">00:00</div>

  <script>
    let countdown;
    function startTimer(seconds) {
      clearInterval(countdown); // Stop any existing timer
      let timeLeft = seconds;
      const timerDisplay = document.getElementById('timer');
      timerDisplay.style.color = 'black';
      timerDisplay.textContent = formatTime(timeLeft);
      
      countdown = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) {
          clearInterval(countdown);
          timerDisplay.style.color = 'red'; // Turn red when finished
          timerDisplay.textContent = "TIME'S UP!";
        }
      }, 1000);
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
  </script>
</body>
</html>
